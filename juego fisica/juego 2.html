<!DOCTYPE html>
<html>
<head>
  <title>Conversor de Magnitudes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 50px;
    }

    h1 {
      margin-bottom: 30px;
    }

    .converter-container {
      max-width: 400px;
      margin: 0 auto;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      background-color: #f8f8f8;
    }

    .input-container {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
    }

    select, input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }

    button {
      padding: 10px 20px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h1>Conversor de Magnitudes</h1>
  <div class="converter-container">
    <div class="input-container">
      <label>Valor a convertir:</label>
      <input type="number" id="value">
    </div>

    <div class="input-container">
      <label>Magnitud de origen:</label>
      <select id="fromMagnitude">
        <option value="length">Longitud</option>
        <option value="time">Tiempo</option>
        <option value="mass">Masa</option>
      </select>
    </div>

    <div class="input-container">
      <label>Unidad de origen:</label>
      <select id="fromUnit"></select>
    </div>

    <div class="input-container">
      <label>Magnitud de destino:</label>
      <select id="toMagnitude">
        <option value="length">Longitud</option>
        <option value="time">Tiempo</option>
        <option value="mass">Masa</option>
      </select>
    </div>

    <div class="input-container">
      <label>Unidad de destino:</label>
      <select id="toUnit"></select>
    </div>

    <button onclick="convert()">Convertir</button>

    <div id="result"></div>
  </div>

  <script>
    const units = {
      length: {
        meter: 'Metro (m)',
        centimeter: 'Centimetro (cm)',
        kilometer: 'Kilometro (km)',
      },
      time: {
        second: 'Segundo (s)',
        minute: 'Minuto (min)',
        hour: 'Hora (h)',
      },
      mass: {
        kilogram: 'Kilogramo (kg)',
        gram: 'Gramo (g)',
        ton: 'Tonelada (t)',
      },
    };

    function fillUnitOptions() {
      const fromMagnitude = document.getElementById('fromMagnitude').value;
      const toMagnitude = document.getElementById('toMagnitude').value;
      const fromUnitSelect = document.getElementById('fromUnit');
      const toUnitSelect = document.getElementById('toUnit');

      fromUnitSelect.innerHTML = '';
      toUnitSelect.innerHTML = '';

      for (const unit in units[fromMagnitude]) {
        const option1 = document.createElement('option');
        option1.value = unit;
        option1.innerText = units[fromMagnitude][unit];
        fromUnitSelect.appendChild(option1);
      }

      for (const unit in units[toMagnitude]) {
        const option2 = document.createElement('option');
        option2.value = unit;
        option2.innerText = units[toMagnitude][unit];
        toUnitSelect.appendChild(option2);
      }
    }

    function convert() {
      const value = parseFloat(document.getElementById('value').value);
      const fromUnit = document.getElementById('fromUnit').value;
      const toUnit = document.getElementById('toUnit').value;
      const fromMagnitude = document.getElementById('fromMagnitude').value;
      const toMagnitude = document.getElementById('toMagnitude').value;
      let result;

      if (fromMagnitude === toMagnitude) {
        result = value * getRatio(fromMagnitude, fromUnit, toUnit);
      } else {
        const commonUnit = 'meter';
        const commonValue = value * getRatio(fromMagnitude, fromUnit, commonUnit);
        result = commonValue / getRatio(toMagnitude, commonUnit, toUnit);
      }

      document.getElementById('result').innerText = `${value} ${units[fromMagnitude][fromUnit]} son ${result.toFixed(2)} ${units[toMagnitude][toUnit]}`;
    }

    function getRatio(magnitude, fromUnit, toUnit) {
      const ratios = {
        length: {
          meter: 1,
          centimeter: 0.01,
          kilometer: 1000,
        },
        time: {
          second: 1,
          minute: 60,
          hour: 3600,
        },
        mass: {
          kilogram: 1,
          gram: 0.001,
          ton: 1000,
        },
      };

      return ratios[magnitude][fromUnit] / ratios[magnitude][toUnit];
    }

    document.getElementById('fromMagnitude').addEventListener('change', fillUnitOptions);
    document.getElementById('toMagnitude').addEventListener('change', fillUnitOptions);

    fillUnitOptions(); // Fill initial unit options
  </script>
</body>
</html>
